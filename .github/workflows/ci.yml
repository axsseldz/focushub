name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run type check
        run: npm run type-check

      - name: Run tests if present
        run: |
          if find . \( -path './node_modules' -o -path './.next' \) -prune -o \
            -type f \( -name '*.test.*' -o -name '*.spec.*' \) -print | grep -q .; then
            if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)"; then
              npm test
            else
              echo "Frontend tests found, but no test script is defined."
              exit 1
            fi
          else
            echo "No frontend tests found. Skipping."
          fi

      - name: Build application
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install fastapi pytest uvicorn
          fi

      - name: Run lint if available
        run: |
          source .venv/bin/activate
          if python -c "import importlib.util, sys; sys.exit(0 if importlib.util.find_spec('ruff') else 1)"; then
            python -m ruff check .
          elif python -c "import importlib.util, sys; sys.exit(0 if importlib.util.find_spec('flake8') else 1)"; then
            python -m flake8 .
          else
            echo "No backend linter installed. Skipping."
          fi

      - name: Run tests if present
        run: |
          source .venv/bin/activate
          if [ -d tests ] && find tests -type f \( -name 'test_*.py' -o -name '*_test.py' \) -print | grep -q .; then
            pytest
          else
            echo "No backend tests found. Skipping."
          fi

      - name: Verify application import
        run: |
          source .venv/bin/activate
          python -c "from main import app; assert app is not None"
